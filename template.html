    }
  }

  async function getCachedMediaUrls() {
    if (!('caches' in window)) return new Set();
    try {
      const cache = await caches.open('media-v1');
      const keys = await cache.keys();
      return new Set(keys.map((req) => toPathKey(req.url)));
    } catch (e) {
      return new Set();
    }
  }

  async function checkForMediaUpdate() {
    let versionInfo;
    try {
      const res = await fetch('version.json', { cache: 'no-store' });
      if (!res.ok) return;
      versionInfo = await res.json();
    } catch (e) {
      return; // offline or unreachable - nothing to offer
    }

    const cachedUrls = await getCachedMediaUrls();

    // asset-list.json is tiny (a few KB) so we always fetch it — this lets us
    // clean up stale cache entries on every load, not just when a download runs.
    let manifest;
    try {
      const res2 = await fetch('asset-list.json', { cache: 'no-store' });
      if (!res2.ok) return;
      manifest = await res2.json();
    } catch (e) {
      return;
    }

    // Self-cleaning: drop any cached media not in the current manifest
    // (stale ?v= hashes, files removed between versions, interrupted state)
    // so the offline library never grows past the current asset set.
    const keepKeys = new Set(manifest.assets.map((a) => toPathKey(a.url)));
    const stillCached = [...cachedUrls].filter((k) => keepKeys.has(k));
    if (stillCached.length !== cachedUrls.size) {
      sendToSW({ type: 'PRUNE', keepUrls: manifest.assets.map((a) => a.url) });
    }

    const missing = manifest.assets.filter((a) => !cachedUrls.has(toPathKey(a.url)));
    if (missing.length === 0) {
      try { localStorage.setItem('installedMediaVersion', String(versionInfo.version)); } catch (e) {}
      currentAssets = null;
      return;
    }

    const isFirstInstall = cachedUrls.size === 0;
    if (!isFirstInstall && sessionStorage.getItem(LATER_KEY)) return;

    currentAssets = {
      assets: missing,
      allAssets: manifest.assets,
      version: versionInfo.version,
      mode: isFirstInstall ? 'first' : 'update',
    };
    const totalSize = missing.reduce((sum, a) => sum + (a.size || 0), 0);
    // First-install audio is offered quietly via the home-page panel
    // (#offline-status, see refreshOfflineStatus below) — no bottom-banner
    // gate on load. The banner is still used for the "update" case (media
    // already installed, a newer version exists) since that's a distinct,
    // less frequent prompt users expect to see.
    if (currentAssets.mode === 'update') {
      showBanner(currentAssets.mode, totalSize);
    }
    refreshOfflineStatus();
  }

  async function checkStorageQuota(neededBytes) {
    if (!('storage' in navigator) || !navigator.storage.estimate) return true;
    try {
      if (navigator.storage.persist) {
        await navigator.storage.persist();
      }
      const estimate = await navigator.storage.estimate();
      const available = (estimate.quota || 0) - (estimate.usage || 0);
      return available > neededBytes * 1.1; // small safety margin
    } catch (e) {
      return true; // can't check - proceed optimistically, SW reports quota errors per-asset
    }
  }

  function sendToSW(msg) {
    if ('serviceWorker' in navigator && navigator.serviceWorker.controller) {
      navigator.serviceWorker.controller.postMessage(msg);
      return true;
    }
    return false;
  }

  // Set to a callback in startDownload; the SW 'message' handler calls it so
  // startDownload knows the SW is alive and the iOS fallback is not needed.
  let swProgressSeen = () => {};

  async function startDownload() {
    if (!currentAssets) return;
    // swProgressSeen is (re)assigned inside startDownload; ensure it exists
    // before the SW 'message' handler runs (which calls it) — see startDownload.
    const totalBytes = currentAssets.assets.reduce((sum, a) => sum + (a.size || 0), 0);
    const enoughSpace = await checkStorageQuota(totalBytes);
    if (!enoughSpace) {
      showTransientMessage(t('storageError'), 4000);
      return;
    }

    nowBtn.hidden = true;
    laterBtn.hidden = true;
    progressWrap.hidden = false;
    progressBar.style.width = '0%';
    textEl.textContent = t('downloading', { done: 0, total: currentAssets.assets.length });

    // Track when the SW responds so we can fall back to a page-side download
    // path if it doesn't (iOS Safari: SW is registered and controlling, but
    // postMessage from the page never elicits a reply — verified via #diagdl).
    let swResponded = false;
    swProgressSeen = () => { swResponded = true; };

    const hasSWCtrl = ('serviceWorker' in navigator) && navigator.serviceWorker.controller;
    if (hasSWCtrl) {
      try { await navigator.serviceWorker.ready; } catch (e) {}
      sendToSW({ type: 'DOWNLOAD_ASSETS', assets: currentAssets.assets, keepUrls: currentAssets.allAssets.map((a) => a.url) });
      // Give the SW ~5s to prove it's alive. If nothing comes back, take over
      // from the page (works on iOS where SW postMessage is a dead channel).
      setTimeout(() => {
        if (!swResponded && currentAssets) {
          textEl.textContent = 'Direct download…';
          directDownload(currentAssets.assets, currentAssets.allAssets);
        }
      }, 5000);
    } else {
      // No SW controller at all (iOS private mode, first install, etc.) — go
      // straight to the page-side path.
      directDownload(currentAssets.assets, currentAssets.allAssets);
    }
  }

  // Page-side parallel downloader — mirrors the SW's DOWNLOAD_ASSETS logic
  // (6-way concurrency, PROGRESS updates, PRUNE at the end) but doesn't
  // depend on the service-worker message channel, which is broken on iOS.
  async function directDownload(assets, allAssets) {
    let cache;
    try { cache = await caches.open('media-v1'); }
    catch (e) { showTransientMessage(t('storageError'), 4000); return; }

    // Prune stale entries first (same as SW does).
    try {
      const keep = new Set(allAssets.map(a => toPathKey(a.url)));
      const existing = await cache.keys();
      for (const req of existing) {
        if (!keep.has(toPathKey(req.url))) { try { await cache.delete(req); } catch (e) {} }
      }
    } catch (e) {}

    const total = assets.length;
    let done = 0, bytesDone = 0, index = 0;
    const CONCURRENCY = 6;

    async function worker() {
      while (index < assets.length) {
        const asset = assets[index++];
        try {
          const existing = await cache.match(asset.url);
          if (!existing) {
            const r = await fetch(asset.url);
            if (r && r.ok) { try { await cache.put(asset.url, r.clone()); } catch (e) {} }
          }
          done++; bytesDone += (asset.size || 0);
          textEl.textContent = t('downloading', { done, total });
          progressBar.style.width = Math.round((done/total)*100) + '%';
          updateHomeOfflineProgress(done, total, bytesDone);
        } catch (e) { /* continue with rest */ }
      }
    }
    const workers = [];
    for (let i = 0; i < Math.min(CONCURRENCY, assets.length); i++) workers.push(worker());
    await Promise.all(workers);

    showTransientMessage(t('downloadComplete'), 2500);
    if (currentAssets) {
      try { localStorage.setItem('installedMediaVersion', String(currentAssets.version)); } catch (e) {}
    }
    currentAssets = null;
    audioDownloading = false;
    refreshOfflineStatus();
  }

  if ('serviceWorker' in navigator) navigator.serviceWorker.addEventListener('message', (event) => {
    const data = event.data;
    if (!data || !data.type) return;
    swProgressSeen();
    if (data.type === 'PROGRESS') {
      textEl.textContent = t('downloading', { done: data.done, total: data.total });
      const pct = data.total ? Math.round((data.done / data.total) * 100) : 0;
      progressBar.style.width = pct + '%';
      updateHomeOfflineProgress(data.done, data.total, data.bytesDone || 0);
    } else if (data.type === 'DOWNLOAD_COMPLETE') {
      showTransientMessage(t('downloadComplete'), 2500);
      if (currentAssets) {
        try { localStorage.setItem('installedMediaVersion', String(currentAssets.version)); } catch (e) {}
        sendToSW({ type: 'PRUNE', keepUrls: currentAssets.allAssets.map((a) => a.url) });
      }
      currentAssets = null;
      audioDownloading = false;
      refreshOfflineStatus();
    }
    // DOWNLOAD_ERROR: the SW already continues with the remaining assets;
    // the final DOWNLOAD_COMPLETE message reflects the actually-cached count.
  });

  // beginAudioDownload() is the single entry point for actually starting the
  // audio download: it's the bottom-banner "now" button handler AND — via
  // window.startOfflineDownload() -> nowBtn.click() below — what the home
  // page's State A button ends up triggering. In the new background-download
  // UX the bottom banner must not compete with the home page's inline panel,
  // so it's hidden immediately; all live progress goes to #offline-status.
  function beginAudioDownload() {
    audioDownloading = true;
    lastProgress = { done: 0, total: (currentAssets ? currentAssets.assets.length : 0), bytesDone: 0 };
    banner.hidden = true;
    refreshOfflineStatus();
    startDownload();
  }

  nowBtn.addEventListener('click', beginAudioDownload);
  laterBtn.addEventListener('click', () => {
    try { sessionStorage.setItem(LATER_KEY, '1'); } catch (e) {}
    banner.hidden = true;
  });

  window.addEventListener('load', checkForMediaUpdate);
  window.addEventListener('online', checkForMediaUpdate);

  // ---- Two-choice offline UX (State A: chooser) ----
  //
  // Rework of the single-flow "background download" panel: the home page
  // now presents two explicit, independent choices — "text only" (an
  // instant acknowledgement, since the app shell is already precached by
  // the SW on first visit) and "text + audio" (the pre-existing v32
  // background-download flow, unchanged). TEXT_ONLY_KEY remembers the
  // user's choice so we don't ask again once they've picked text-only;
  // picking "add audio" later clears the need to ask by moving straight
  // into the ready/all-ready states.
  const TEXT_ONLY_KEY = 'textOnlyAccepted';
  function isTextOnlyAccepted() {
    try { return localStorage.getItem(TEXT_ONLY_KEY) === '1'; } catch (e) { return false; }
  }

  function renderOfflineChooserHtml(sizeBytes) {
    const size = fmtSize(sizeBytes);
    return '<div class="offline-choice-panel">'
      + '<div class="offline-choice-title">' + esc(t('offlineChooseTitle')) + '</div>'
      + '<div class="offline-choice-buttons">'
      + '<button type="button" class="offline-choose-btn" onclick="window.chooseTextOnlyOffline()">'
      + esc(t('offlineTextOnlyBtn')) + '</button>'
      + '<button type="button" class="offline-choose-btn" onclick="window.startOfflineDownload()">'
      + esc(t('offlineWithAudioBtn', { size })) + '</button>'
      + '</div></div>';
  }

  // Flow A: text-only acknowledged. Small secondary button lets the user
  // switch into Flow B (window.startOfflineDownload) at any time.
  function renderOfflineTextReadyHtml(remainingBytes) {
    const size = fmtSize(remainingBytes);
    return '<div class="offline-flow-state" data-offline-state="text-ready">'
      + '<p class="offline-flow-ready-line">' + esc(t('offlineTextReady')) + '</p>'
      + '<button type="button" class="offline-flow-secondary-btn" onclick="window.startOfflineDownload()">'
      + esc(t('offlineAddAudioLater', { size })) + '</button>'
      + '</div>';
  }

  // Flow A: brief "preparing" state shown for a moment on click, before the
  // ready line — shell is already cached so this is a fake-progress beat,
  // not a real wait.
  function renderOfflinePreparingTextsHtml() {
    return '<div class="offline-flow-state" data-offline-state="preparing-text">'
      + '<div class="offline-panel-title">📖 ' + esc(t('offlinePreparingTexts')) + '</div>'
      + '<div class="offline-progress-bar"><div class="offline-progress-fill" style="width:100%"></div></div>'
      + '</div>';
  }

  // Flow B: live/resumable download state. `resumable` is true when audio
  // is partially cached but no download is currently in flight (e.g. after
  // reopening the app) — per Rājan's "user chooses" requirement this never
  // auto-starts; it shows a button wired to the same entry point
  // (window.startOfflineDownload) that Flow B's chooser button uses.
  function renderOfflineDownloadingHtml(done, total, bytesDone, resumable) {
    const pct = total ? Math.round((done / total) * 100) : 0;
    const remaining = total && done < total
      ? Math.max(0, Math.round((bytesDone / Math.max(done, 1)) * (total - done)))
      : 0;
    const resumeBtn = resumable
      ? '<button type="button" class="offline-choose-btn" onclick="window.startOfflineDownload()">'
        + esc(t('offlineWithAudioBtn', { size: fmtSize(remaining) })) + '</button>'
      : '';
    return '<div class="offline-flow-state offline-flow-state--busy" data-offline-state="downloading-audio">'
      + '<div class="offline-panel-title">🎵 ' + esc(t('offlineDownloadingAudio')) + '</div>'
      + '<p class="offline-panel-body">' + esc(t('audioBgHint1'))
      + '<span class="offline-panel-hint">' + esc(t('audioBgHint2')) + '</span></p>'
      + '<div class="offline-panel-body" id="offline-progress-text">'
      + esc(t('audioBgProgress', { done, total, size: fmtSize(bytesDone) })) + '</div>'
      + '<div class="offline-progress-bar"><div class="offline-progress-fill" id="offline-progress-fill" style="width:' + pct + '%"></div></div>'
      + resumeBtn
      + '<div class="offline-panel-footnote">' + esc(t('wifiHint')) + '</div>'
      + '</div>';
  }

  // State C: everything (text + all audio) ready.
  function renderOfflineAllReadyHtml(count) {
    return '<div class="offline-ready-row">' + esc(t('offlineAllReady', { count })) + '</div>';
  }

  // Persistent offline-status control on the home page (always discoverable,
  // unlike the transient banner). Rendered by renderHome via #offline-status.
  // States: two-button chooser / text-only ready / downloading audio
  // (live or resumable) / everything ready. Never re-renders mid-download
  // except to transition INTO the downloading state — see
  // updateHomeOfflineProgress, which patches numbers in place once that
  // panel exists.
  async function refreshOfflineStatus() {
    const el = document.getElementById('offline-status');
    if (!el) return;
    try {
      if (audioDownloading) {
        el.innerHTML = renderOfflineDownloadingHtml(lastProgress.done, lastProgress.total, lastProgress.bytesDone, false);
        return;
      }
      const cachedUrls = await getCachedMediaUrls();
      let manifest = null;
      try {
        const res = await fetch('asset-list.json', { cache: 'no-store' });
        if (res.ok) manifest = await res.json();
      } catch (e) { /* offline */ }

      if (!manifest) {
        // Can't reach the manifest (offline, first load before SW is warm) —
        // render from what we already know locally.
        if (cachedUrls.size > 0) {
          el.innerHTML = renderOfflineAllReadyHtml(cachedUrls.size);
        } else if (isTextOnlyAccepted()) {
          el.innerHTML = renderOfflineTextReadyHtml(0);
        } else {
          el.innerHTML = '';
        }
        return;
      }

      const totalCount = manifest.assets.length;
      const totalSize = manifest.assets.reduce((s, a) => s + (a.size || 0), 0);
      const missing = manifest.assets.filter((a) => !cachedUrls.has(toPathKey(a.url)));
      const missingSize = missing.reduce((s, a) => s + (a.size || 0), 0);
      const cachedCount = totalCount - missing.length;

      if (totalCount > 0 && missing.length === 0) {
        el.innerHTML = renderOfflineAllReadyHtml(totalCount);
        return;
      }

      if (cachedCount > 0 && missing.length > 0) {
        // Audio partially downloaded from an earlier session — offer to
        // resume via the same button, without auto-starting.
        el.innerHTML = renderOfflineDownloadingHtml(cachedCount, totalCount, totalSize - missingSize, true);
        return;
      }

      if (isTextOnlyAccepted()) {
        el.innerHTML = renderOfflineTextReadyHtml(missingSize);
        return;
      }

      el.innerHTML = renderOfflineChooserHtml(missingSize);
    } catch (e) { /* leave empty */ }
  }

  // Called from both progress-delivery paths (SW 'PROGRESS' postMessage and
  // directDownload's own loop). If the downloading panel is already
  // showing, patch its numbers/width in place — cheap, no re-render of the
  // home page. If the panel isn't up yet (download just started, or user
  // navigated home mid-download), do one refreshOfflineStatus() to bring it
  // up; further calls then take the cheap patch path.
  function updateHomeOfflineProgress(done, total, bytesDone) {
    lastProgress = { done, total, bytesDone };
    const textNode = document.getElementById('offline-progress-text');
    const fillNode = document.getElementById('offline-progress-fill');
    if (textNode && fillNode) {
      textNode.textContent = t('audioBgProgress', { done, total, size: fmtSize(bytesDone) });
      const pct = total ? Math.round((done / total) * 100) : 0;
      fillNode.style.width = pct + '%';
    } else if (audioDownloading) {
      refreshOfflineStatus();
    }
  }

  // Flow A entry point — wired to the "Text only" chooser button. The app
  // shell is already precached by the SW on first visit, so this is
  // effectively an acknowledgement: persist the choice and show the ready
  // state. A brief fake-progress beat is shown first so the click feels
  // like it did something.
  window.chooseTextOnlyOffline = function () {
    try { localStorage.setItem(TEXT_ONLY_KEY, '1'); } catch (e) {}
    const el = document.getElementById('offline-status');
    if (el) el.innerHTML = renderOfflinePreparingTextsHtml();
    setTimeout(refreshOfflineStatus, 700);
  };

  // Flow B entry point — wired to the "Text + audio" chooser button, the
  // "Add audio too" secondary button (Flow A -> B), and the resumable
  // downloading-state button. Unchanged from v32: goes through
  // checkForMediaUpdate() -> nowBtn.click() -> beginAudioDownload().
  window.startOfflineDownload = function () {
    try { sessionStorage.removeItem(LATER_KEY); } catch (e) {}
    checkForMediaUpdate().then(() => {
      // checkForMediaUpdate no longer shows the banner for a first-install;
      // trigger the download directly since the user already clicked the
      // home-page button. nowBtn.click() runs beginAudioDownload().
      if (currentAssets) nowBtn.click();
    });
  };

  window.refreshOfflineStatus = refreshOfflineStatus;
  window.updateHomeOfflineProgress = updateHomeOfflineProgress;
  window.addEventListener('load', refreshOfflineStatus);
  window.addEventListener('online', refreshOfflineStatus);
})();

// Hash listener
window.addEventListener('hashchange', () => {
  const route = window.location.hash.substring(1);
  const preserve = pendingPreserveScroll;
  pendingPreserveScroll = false;
  render(route, preserve);
});

// Skip-link label is localized once workingLang is known; the static markup
// carries an English fallback for the instant before this script runs.
const skipLinkEl = document.getElementById('skip-link');
if (skipLinkEl) skipLinkEl.textContent = t('skipToContent');

applyFontScale();

// Initial render
const initRoute = window.location.hash.substring(1) || 'home';
render(initRoute);
</script>

</body>
</html>
