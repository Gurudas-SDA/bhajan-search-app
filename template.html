function getWorkingLang() {
  const stored = localStorage.getItem('workingLang');
  if (stored && UI_STRINGS[stored]) return stored;
  return null;
}

function setWorkingLang(code) {
  localStorage.setItem('workingLang', code);
  // Reset the single-language view to the new language whenever workingLang changes
  currentLang = (code === 'en') ? 'english' : LANG_FIELD[code];
  localStorage.setItem('currentLang', currentLang);
}

function t(key, params) {
  const lang = getWorkingLang() || 'en';
  const dict = UI_STRINGS[lang] || UI_STRINGS.en;
  let str = dict[key] !== undefined ? dict[key] : (UI_STRINGS.en[key] || key);
  if (params) {
    Object.keys(params).forEach(p => {
      str = str.replace('{' + p + '}', params[p]);
    });
  }
  return str;
}

// Normalize IAST character to ASCII letter
function normalizeLetter(ch) {
  const map = {
    '\u015a':'S','\u015b':'S','\u1e62':'S','\u1e63':'S',
    '\u1e5a':'R','\u1e5b':'R',
    '\u1e44':'N','\u1e45':'N','\u00d1':'N','\u00f1':'N','\u1e46':'N','\u1e47':'N',
    '\u1e6c':'T','\u1e6d':'T',
    '\u1e0c':'D','\u1e0d':'D',
    '\u1e40':'M','\u1e41':'M','\u1e42':'M','\u1e43':'M',
    '\u0100':'A','\u0101':'A',
    '\u012a':'I','\u012b':'I',
    '\u016a':'U','\u016b':'U',
    '\u1e24':'H','\u1e25':'H',
    '\u1e36':'L','\u1e37':'L',
    '\u014c':'O','\u014d':'O',
    '\u0112':'E','\u0113':'E',
  };
  if (map[ch]) return map[ch];
  // NFD fallback
  const decomposed = ch.normalize('NFD');
  return decomposed[0].toUpperCase();
}

function getFirstLetter(text) {
  if (!text) return '#';
  // Skip leading non-letter characters like (, ), -, spaces
  const cleaned = text.trim().replace(/^[^\p{L}]+/u, '');
  if (!cleaned) return '#';
  return normalizeLetter(cleaned[0]);
}

// Group bhajans by a key function, returning sorted letter -> bhajans map
function groupByLetter(items, keyFn) {
  const groups = {};
  items.forEach(b => {
    const letter = getFirstLetter(keyFn(b));
    if (!groups[letter]) groups[letter] = [];
    groups[letter].push(b);
  });
  // Sort letters
  const sorted = {};
  Object.keys(groups).sort().forEach(k => {
    sorted[k] = groups[k].sort((a, b) => keyFn(a).localeCompare(keyFn(b)));
  });
  return sorted;
}

// Escape HTML
function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// Alpha nav
function setAlphaNav(letters, scrollPrefix) {
  const nav = document.getElementById('alpha-nav');
  if (!letters || letters.length === 0) {
    nav.style.display = 'none';
    return;
  }
  nav.style.display = 'block';
  const allLetters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
  const activeSet = new Set(letters);
  let html = '';
  allLetters.forEach(l => {
    if (activeSet.has(l)) {
      html += '<a href="#" onclick="scrollToLetter(\'' + l + '\', \'' + scrollPrefix + '\'); return false;">' + l + '</a>';
    } else {
      html += '<a class="disabled">' + l + '</a>';
    }
  });
  nav.innerHTML = html;
}

function scrollToLetter(letter, prefix) {
  const el = document.getElementById(prefix + '-' + letter);
  if (el) {
    const bcH = document.getElementById('breadcrumb').offsetHeight;
    const anH = document.getElementById('alpha-nav').offsetHeight;
    const y = el.getBoundingClientRect().top + window.pageYOffset - bcH - anH - 8;
    window.scrollTo({ top: y, behavior: 'smooth' });
  }
}

function getCategoryCounts() {
  const map = {};
  BHAJANS.forEach(b => {

  return Object.entries(map).sort((a, b) => a[0].localeCompare(b[0]));
}

function getAuthorCounts() {
  const map = {};
  BHAJANS.forEach(b => {
    map[b.author] = (map[b.author] || 0) + 1;
  });
  return Object.entries(map).sort((a, b) => a[0].localeCompare(b[0]));
}

// Find bhajan by title
function findBhajan(title) {
  return BHAJANS.find(b => b.title === title);
}

// Get verse text by language
function getVerseText(verse, lang) {
  switch (lang) {
    case 'english': return verse.english;
    case 'russian': return verse.russian;
    case 'latvian': return verse.latvian;
    case 'spanish': return verse.spanish;
    case 'italian': return verse.italian;
    case 'french': return verse.french;
    default: return verse.original;
  }
}

// Check if current mode shows two languages
function isDualLang(lang) {
  return lang.startsWith('orig+');
}

// Get translation language from dual mode
function getDualTranslation(verse, lang) {
  if (!isDualLang(lang)) return '';
  const field = lang.substring(5); // strip 'orig+'
  return getVerseText(verse, field) || '';
}

  if (wl === 'en') {
    html += btn('english', 'English');
    html += btn('orig+english', 'English + ' + t('original'));
  } else {
    html += btn('english', 'EN');
    html += btn(field, nativeName);
    html += btn('orig+' + field, nativeName + ' + ' + t('original'));
  }
  html += '</div>';
  return html;
}

function renderVersesContainer(b) {
  let html = '<div id="verses-container">';
  const wl = getWorkingLang() || 'en';
  b.verses.forEach(v => {
    html += '<div class="verse">';
    html += '<div class="verse-number">' + esc(t('verseWord')) + ' ' + v.number + '</div>';
    if (isDualLang(currentLang)) {
      const orig = v.original;
      const trans = getDualTranslation(v, currentLang);
      if (orig) html += '<div class="verse-text verse-original" lang="sa">' + esc(orig) + '</div>';
      if (trans) {
        html += '<div class="verse-text verse-translation" lang="' + wl + '">' + esc(trans) + '</div>';
      } else {
        html += '<div class="verse-text" style="color:var(--text-secondary);font-style:italic;">' + esc(t('translationNotAvailable')) + '</div>';
      }
    } else {
      const text = getVerseText(v, currentLang);
      const langAttr = currentLang === 'original' ? 'sa' : (currentLang === 'english' ? 'en' : wl);
      if (text) {
        html += '<div class="verse-text" lang="' + langAttr + '">' + esc(text) + '</div>';
      } else {
        html += '<div class="verse-text" style="color:var(--text-secondary);font-style:italic;">' + esc(t('translationNotAvailable')) + '</div>';
      }
    }
    html += '</div>';
  });
  html += '</div>';
  return html;
}

function renderBhajan(title) {
  const b = findBhajan(title);
  if (!b) return '<p>' + esc(t('bhajanNotFound')) + '</p>';

  setBreadcrumb([
    {label: b.category, hash: 'category:' + encodeURIComponent(b.category)},
    {label: b.title, hash: null}
  ]);
  setAlphaNav(null);

  let html = compactHeader();
  html += '<div class="bhajan-view">';
  html += '<h2>' + esc(b.title) + '</h2>';
  html += '<div class="bv-meta">';
  html += 'by <a href="#author:' + encodeURIComponent(b.author) + '" onclick="navigate(\'author:' + encodeURIComponent(b.author) + '\'); return false;">' + esc(b.author) + '</a>';
  html += ' &middot; <a href="#category:' + encodeURIComponent(b.category) + '" onclick="navigate(\'category:' + encodeURIComponent(b.category) + '\'); return false;">' + esc(b.category) + '</a>';
  html += ' &middot; ' + b.verses.length + ' ' + esc(t('verses'));
  html += '</div>';

  // Audio player wrapper — rendered ONCE, never touched by switchLang re-renders (M1 fix)
  html += '<div id="audio-player-wrapper">';

  // YouTube embed (if available)
  const ytId = YOUTUBE_IDS[b.title];
  if (ytId) {
    html += '<div class="yt-embed">';
    html += '<iframe src="https://www.youtube.com/embed/' + ytId + '?rel=0" frameborder="0" allowfullscreen loading="lazy" title="' + esc(b.title) + '"></iframe>';
    html += '</div>';
  }

  // Audio player (local GitHub Pages files)
  const audioSrc = AUDIO_IDS[b.title];
  if (audioSrc) {
    const apId = 'ap_' + Math.random().toString(36).slice(2,8);
    html += '<div class="audio-player">';
    html += '<div class="audio-player-header">';
    html += '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>';
    html += esc(t('audioSankirtana')) + '</div>';
    html += '<audio id="' + apId + '" preload="none" src="' + audioSrc + '" style="display:none"></audio>';
    html += '<div class="audio-controls">';
    html += '<button class="ap-play-btn" aria-label="Play/Pause" onclick="apToggle(\'' + apId + '\')" id="btn_' + apId + '">';
    html += '<svg width="12" height="14" viewBox="0 0 12 14"><polygon points="0,0 12,7 0,14"/></svg></button>';
    html += '<span class="ap-time" id="time_' + apId + '">0:00 / 0:00</span>';
    html += '<input type="range" class="ap-seek" aria-label="Seek" id="seek_' + apId + '" value="0" min="0" max="100" step="0.1" oninput="apSeek(\'' + apId + '\')">';
    html += '</div></div>';
  }
  html += '</div>'; // #audio-player-wrapper

  // Language selector — single row (4 buttons, or 3 for English working language)
  const enc = encodeURIComponent(title);
  html += renderLangButtons(enc);

  // Verses — isolated in their own container so switchLang can re-render
  // just this part without disturbing the audio player (M1 fix)
  html += renderVersesContainer(b);
  html += '</div>';
  return html;
}

function switchLang(lang, encodedTitle) {
  currentLang = lang;
  localStorage.setItem('currentLang', currentLang);
  const title = decodeURIComponent(encodedTitle);
  const b = findBhajan(title);
  if (!b) return;
  // Re-render ONLY the verses container and the language button row —
  // the audio player (and any playing audio) is left untouched.
  const versesEl = document.getElementById('verses-container');
  if (versesEl) {
    versesEl.outerHTML = renderVersesContainer(b);
  }
  const selectorEl = document.querySelector('.bhajan-view .lang-selector');
  if (selectorEl) {
    selectorEl.outerHTML = renderLangButtons(encodedTitle);
  }
}

// Router
function navigate(route) {
  window.location.hash = route;
}

function render(route, preserveScroll) {
  const app = document.getElementById('app');
  const scrollPos = preserveScroll ? window.pageYOffset : 0;

  // First launch (or explicit navigation to the chooser) — full-screen language pick
  if (!getWorkingLang() && route !== 'langchoice') {
    if (route && route !== 'home' && langChoiceReturnRoute === null) {
      langChoiceReturnRoute = route; // preserve deep link through first-launch chooser
    }
    document.getElementById('breadcrumb').style.display = 'none';
    document.getElementById('alpha-nav').style.display = 'none';
    app.innerHTML = renderLanguageChoice(true);
    window.scrollTo(0, 0);
    return;
  }
  document.getElementById('breadcrumb').style.display = '';

  if (route === 'langchoice') {
    document.getElementById('alpha-nav').style.display = 'none';
    app.innerHTML = renderLanguageChoice(!getWorkingLang());
    window.scrollTo(0, 0);
    return;
  } else if (!route || route === 'home') {
    app.innerHTML = renderHome();
  } else if (route === 'titles') {
    app.innerHTML = renderTitles();
  } else if (route === 'firstline') {
    app.innerHTML = renderFirstLine();
  } else if (route === 'categories') {
    app.innerHTML = renderCategories();
  } else if (route === 'authors') {
    app.innerHTML = renderAuthors();
  } else if (route.startsWith('category:')) {
    const name = decodeURIComponent(route.substring(9));
    app.innerHTML = renderCategoryView(name);
  } else if (route.startsWith('author:')) {
    const name = decodeURIComponent(route.substring(7));
    app.innerHTML = renderAuthorView(name);
  } else if (route.startsWith('bhajan:')) {
    const title = decodeURIComponent(route.substring(7));
    app.innerHTML = renderBhajan(title);
  } else {
    app.innerHTML = renderHome();
  }

  if (preserveScroll) {
    window.scrollTo(0, scrollPos);
  } else {
    window.scrollTo(0, 0);
  }
  initAudioPlayers();
}

// Custom audio player
function apFmt(s) {
  if (!isFinite(s)) return '0:00';
  const m = Math.floor(s/60), sec = Math.floor(s%60);
  return m + ':' + String(sec).padStart(2,'0');
}
function apToggle(id) {
  const a = document.getElementById(id);
  const btn = document.getElementById('btn_' + id);
  if (!a) return;
  if (a.paused) {
    // pause all others
    document.querySelectorAll('audio').forEach(x => { if (x !== a) x.pause(); });
    a.play();
  } else {
    a.pause();
  }
}
function apSeek(id) {
  const a = document.getElementById(id);
  const seek = document.getElementById('seek_' + id);
  if (a && a.duration) a.currentTime = (seek.value / 100) * a.duration;
}
function apSetup(id) {
  const a = document.getElementById(id);
  const seek = document.getElementById('seek_' + id);
  const timeEl = document.getElementById('time_' + id);
  const btn = document.getElementById('btn_' + id);
  if (!a || !seek || !timeEl || !btn) return;
  const playIcon = '<svg width="12" height="14" viewBox="0 0 12 14"><polygon points="0,0 12,7 0,14" fill="white"/></svg>';
  const pauseIcon = '<svg width="12" height="12" viewBox="0 0 12 12"><rect x="0" y="0" width="4" height="12" fill="white"/><rect x="8" y="0" width="4" height="12" fill="white"/></svg>';
  a.addEventListener('play', () => btn.innerHTML = pauseIcon);
  a.addEventListener('pause', () => btn.innerHTML = playIcon);
  a.addEventListener('ended', () => btn.innerHTML = playIcon);
  a.addEventListener('timeupdate', () => {
    if (a.duration) seek.value = (a.currentTime / a.duration) * 100;
    timeEl.textContent = apFmt(a.currentTime) + ' / ' + apFmt(a.duration);
  });
  a.addEventListener('loadedmetadata', () => {
    timeEl.textContent = '0:00 / ' + apFmt(a.duration);
  });
  // style seek fill
  seek.addEventListener('input', () => {
    seek.style.background = 'linear-gradient(to right, var(--saffron) ' + seek.value + '%, var(--border-tan) ' + seek.value + '%)';
  });
}
// Initialize all audio players after render
function initAudioPlayers() {
  document.querySelectorAll('audio[id^="ap_"]').forEach(a => apSetup(a.id));
}

// Hash listener
window.addEventListener('hashchange', () => {
  const route = window.location.hash.substring(1);
  render(route);
});

// Initial render
const initRoute = window.location.hash.substring(1) || 'home';
render(initRoute);
</script>
